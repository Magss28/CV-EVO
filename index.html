<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evo Motors</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="style.css">
    <link
    href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css"
    rel="stylesheet"
    />

</head>
<body>

    <h1>🚗 Evo Motors</h1>

    <div class="tabs">
        <button id="btnCatalogo">🚗 Catálogo</button>
        <button id="btnActivos">📦 Activos</button>
        <button id="btnVendidos">💰 Vendidos</button>
        <button id="btnTransferencias">📄 Transferencias</button>
    </div>

    <input
        type="text"
        id="buscador"
        placeholder="Buscar vehículo..."
    >

    <!-- CATALOGO -->

    <div id="catalogoSection">

<!-- ocultar botones de importacion
        <button id="importarMotos">
            📥 Importar Motos 
        </button>

        <button id="importarDeportivos">
        📥 Importar Deportivos
        </button>

        <button id="importarSuperdeportivos">
        📥 Importar Superdeportivos
        </button>

        <button id="importarClasicos">
            📥 Importar Clásicos
        </button> -->


       <!--

        <button id="importarSUV">
        📥 Importar SUV
        </button> -->

        <button
            id="btnAgregarCatalogo"
            class="agregarBtn"
        >
            ➕ Agregar Vehículo al Catálogo
        </button>

        <div
            id="formularioCatalogo"
            style="display:none;"
        >

            <div class="card">
                <button
                    id="cerrarCatalogo"
                    class="cerrarBtn"
                >
                    ❌
                </button>

                <h2>Nuevo Vehículo</h2>

                <input
                    type="text"
                    id="marcaCatalogo"
                    placeholder="Marca"
                >

                <br><br>

                <input
                    type="text"
                    id="modeloCatalogo"
                    placeholder="Modelo"
                >

                <br><br>

                <input
                    type="number"
                    id="precioCatalogo"
                    placeholder="Precio Conce"
                >

                <br><br>

                <input
                    type="text"
                    id="categoriaCatalogo"
                    placeholder="Categoría"
                >

                <br><br>

                <button id="guardarCatalogo">
                    Guardar Vehículo
                </button>

            </div>

        </div>

        <div id="autos"></div>

    </div>

    <!-- ACTIVOS -->

    <div id="activosSection">

        <button id="btnAgregar" class="agregarBtn">
            ➕ Agregar Vehículo
        </button>

        <div id="formularioActivo" style="display:none;">

            <div class="card">
                <button
                    id="cerrarActivo"
                    class="cerrarBtn"
                >
                    ❌
                </button>
                <h2>Nuevo Vehículo</h2>
                <label>Vehículo</label>
                    <select id="selectVehiculo">
                        <option value="">
                            Seleccionar...
                        </option>
                    </select>

                <br><br>

                <label>Matrícula</label>

                <input
                    type="text"
                    id="matricula"
                    placeholder="RZI001D"
                >

                <br><br>

                <br><br>

                <label>
                    <input
                        type="radio"
                        name="modoPrecio"
                        value="automatico"
                        checked
                    >
                    Precio Automático
                </label>

                <br>

                <label>
                    <input
                        type="radio"
                        name="modoPrecio"
                        value="manual"
                    >
                    Precio Manual
                </label>

                <div
                    id="precioManualDiv"
                    style="display:none;"
                >

                    <br>

                    <input
                        type="number"
                        id="precioCompraManual"
                        placeholder="Precio Compra"
                    >

                    <br><br>

                    <input
                        type="number"
                        id="precioVentaManual"
                        placeholder="Precio Venta"
                    >

                </div> <!-- Fin precio manual -->

                <h3>⚙️ Full Tunning</h3>

                <label>
                    <input type="checkbox" id="motorV8">
                    Motor V8
                </label>

                <br>

                <label>
                    <input type="checkbox" id="turboCharger">
                    Turbo Charger
                </label>

                <br>

                <label>
                    <input type="checkbox" id="frenosCeramicos">
                    Frenos Cerámicos
                </label>

                <br>

                <label>
                    <input type="checkbox" id="llantas">
                    Llantas
                </label>

                <br>

                <label>
                    <input type="checkbox" id="traccion">
                    Tracción
                </label>

                <br><br>

                <br><br>

                <label>
                    <input type="checkbox" id="motor">
                    Motor
                </label>

                <br>

                <label>
                    <input type="checkbox" id="frenos">
                    Frenos
                </label>

                <br>
                
                <label>
                    <input type="checkbox" id="turbo">
                    Turbo
                </label>

                <br>

                <label>
                    <input type="checkbox" id="transmision">
                    Transmisión
                </label>

                <br>

                <label>
                    <input type="checkbox" id="suspension">
                    Suspensión
                </label>

                <br>

                <label>
                    <input type="checkbox" id="blindaje">
                    Blindaje
                 </label>

                 <br><br>

                <label>
                    🛠️ Observaciones del Vehículo
                </label>

                <textarea
                    id="notaModificaciones"
                    placeholder="Ej: Full tuning sin cerámicos"
                ></textarea>

                <div id="calculos">
                    Costo Total: $0
                </div>

                <br>

                <button id="guardarVehiculo">
                    Guardar
                </button>

            </div>

        </div>

        <div id="activos"></div>

    </div>

    <!-- VENDIDOS -->

    <div id="vendidosSection">

        <h2>💰 Historial de Ventas</h2>

        <button id="limpiarVendidos">
            🧹 Limpiar Historial
        </button>

        <div id="vendidos"></div>

    </div>

    <div id="transferenciasSection">

    <h2>📄 Transferencias</h2>

    <div id="transferencias"></div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
    <script type="module" src="app.js"></script>

</body>
</html>
