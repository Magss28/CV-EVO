<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evo Motors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🚗 Evo Motors</h1>

    <div class="tabs">
        <button id="btnCatalogo">🚗 Catálogo</button>
        <button id="btnActivos">📦 Activos</button>
        <button id="btnVendidos">💰 Vendidos</button>
    </div>

    <input
        type="text"
        id="buscador"
        placeholder="Buscar vehículo..."
    >

    <!-- CATALOGO -->

    <div id="catalogoSection">

        <button
            id="btnAgregarCatalogo"
            class="agregarBtn"
        >
            ➕ Agregar Vehículo al Catálogo
        </button>

        <div
            id="formularioCatalogo"
            style="display:none;"
        >

            <div class="card">

                <h2>Nuevo Vehículo</h2>

                <input
                    type="text"
                    id="marcaCatalogo"
                    placeholder="Marca"
                >

                <br><br>

                <input
                    type="text"
                    id="modeloCatalogo"
                    placeholder="Modelo"
                >

                <br><br>

                <input
                    type="number"
                    id="precioCatalogo"
                    placeholder="Precio Conce"
                >

                <br><br>

                <input
                    type="text"
                    id="categoriaCatalogo"
                    placeholder="Categoría"
                >

                <br><br>

                <button id="guardarCatalogo">
                    Guardar Vehículo
                </button>

            </div>

        </div>

        <div id="autos"></div>

    </div>

    <!-- ACTIVOS -->

    <div id="activosSection">

        <button id="btnAgregar" class="agregarBtn">
            ➕ Agregar Vehículo
        </button>

        <div id="formularioActivo" style="display:none;">

            <div class="card">

                <h2>Nuevo Vehículo</h2>

                <label>Vehículo</label>

                <select id="selectVehiculo">
                    <option value="">
                        Seleccionar...
                    </option>
                </select>

                <br><br>

                <label>Matrícula</label>

                <input
                    type="text"
                    id="matricula"
                    placeholder="RZI001D"
                >

                <br><br>

                <label>
                    <input type="checkbox" id="fullTunning">
                    Full Tunning
                </label>

                <br><br>

                <label>
                    <input type="checkbox" id="motor">
                    Motor
                </label>

                <br>

                <label>
                    <input type="checkbox" id="frenos">
                    Frenos
                </label>

                <br>

                <label>
                    <input type="checkbox" id="transmision">
                    Transmisión
                </label>

                <br>

                <label>
                    <input type="checkbox" id="suspension">
                    Suspensión
                </label>

                <br>

                <label>
                    <input type="checkbox" id="blindaje">
                    Blindaje
                </label>

                <br><br>

                <div id="calculos">
                    Costo Total: $0
                </div>

                <br>

                <button id="guardarVehiculo">
                    Guardar
                </button>

            </div>

        </div>

        <div id="activos"></div>

    </div>

    <!-- VENDIDOS -->

    <div id="vendidosSection">

        <h2>💰 Historial de Ventas</h2>

        <div id="vendidos"></div>

    </div>

    <script type="module" src="app.js"></script>

</body>
</html>
